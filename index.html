                const cardCount = activeData.length;
                let minWidth = cardCount <= 6 ? "180px" : (cardCount <= 10 ? "140px" : "110px");
                let fontSize = cardCount <= 6 ? "1.4rem" : (cardCount <= 10 ? "1.1rem" : "0.95rem");
                render(activeData, 'p1-board', minWidth, fontSize);
                render(activeData, 'p2-board', minWidth, fontSize);
                updateYomi("枚数: " + cardCount);
            } else {
                updateYomi("３択モード準備完了");
            }
        }

        function updateYomi(txt) {
            document.getElementById('p1-yomi-text').textContent = txt;
            document.getElementById('p2-yomi-text').textContent = txt;
            document.getElementById('p1-yomi-text').style.display = 'block';
            document.getElementById('p2-yomi-text').style.display = 'block';
        }

        function render(data, boardId, minWidth, fs) {
            const board = document.getElementById(boardId);
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(auto-fit, minmax(${minWidth}, 1fr))`;
            [...data].sort(() => Math.random() - 0.5).forEach(item => {
                const div = document.createElement('div');
                div.className = 'card'; div.textContent = item.t; div.style.fontSize = fs;
                div.onclick = () => tap(item.t, boardId);
                board.appendChild(div);
            });
        }

        function startBattle() {
            if (activeData.length === 0) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            synth.cancel();
            document.getElementById('start-btn').disabled = true;
            gameActive = true;
            if (currentGameMode === 'karuta') setTimeout(next, 800);
            else showLastMission();
        }

        function next() {
            if (!gameActive || activeData.length === 0) return;
            if (activeData.length === 1 && fullSet.length > 1) { showLastMission(); return; }
            updateYomi("......");
            setTimeout(() => {
                if (!gameActive) return;
                const idx = Math.floor(Math.random() * activeData.length);
                currentTarget = activeData.splice(idx, 1)[0];
                speak(currentTarget.y);
            }, 800);
        }

        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ja-JP';
            utter.onstart = () => { updateYomi(text); questionStartTime = Date.now(); };
            setTimeout(() => {
                if (document.getElementById('p1-yomi-text').textContent === "......") {
                    updateYomi(text);
                    questionStartTime = Date.now();
                }
            }, 500);
            synth.speak(utter);
        }

        function tap(term, boardId) {
            if (!currentTarget || !gameActive || questionStartTime === 0) return;
            const isP1 = boardId === 'p1-board';
            const pid = isP1 ? 'p1' : 'p2';
            stats[pid].total++;
            if (term === currentTarget.t) {
                stats[pid].correct++;
                const responseTime = (Date.now() - questionStartTime) / 1000;
                const speedBonus = Math.max(0, Math.floor(5 - responseTime));
                let isLucky = (term === luckyCardTerm);
                let bonusPoints = speedBonus + (isLucky ? 3 : 0);
                beep(880, 0.3);
                if (isP1) { p1Combo++; p2Combo = 0; p1Score += (p1Combo + bonusPoints); document.getElementById('p1-score').textContent = p1Score; showEffects('p1', p1Combo, speedBonus, isLucky); }
                else { p2Combo++; p1Combo = 0; p2Score += (p2Combo + bonusPoints); document.getElementById('p2-score').textContent = p2Score; showEffects('p2', p2Combo, speedBonus, isLucky); }
                document.querySelectorAll('.card').forEach(c => { if (c.textContent === term) c.classList.add('taken'); });
                currentTarget = null; questionStartTime = 0; synth.cancel();
                if (activeData.length === 0) showResult(); else setTimeout(next, 1200);
            } else {
                if (isP1) { p1Combo = 0; p1Score = Math.max(0, p1Score - 1); document.getElementById('p1-score').textContent = p1Score; }
                else { p2Combo = 0; p2Score = Math.max(0, p2Score - 1); document.getElementById('p2-score').textContent = p2Score; }
                applyPenalty(boardId);
            }
        }

        function showLastMission() {
            if (activeData.length === 0) { showResult(); return; }
            const idx = Math.floor(Math.random() * activeData.length);
            currentTarget = activeData.splice(idx, 1)[0];
            updateYomi(currentGameMode === 'quiz' ? "正しい説明を選べ！" : "ラストミッション！正しい説明を選べ！");
            document.querySelectorAll('.board').forEach(e => e.style.display = 'none');
            document.querySelectorAll('.quiz-container').forEach(e => e.style.display = 'flex');
            let dummies = fullSet.filter(i => i.t !== currentTarget.t).sort(() => 0.5 - Math.random()).slice(0, 2);
            let choices = [...dummies, currentTarget].sort(() => 0.5 - Math.random());
            ['p1', 'p2'].forEach(p => {
                document.getElementById(p + '-q-target').textContent = currentTarget.t;
                const container = document.getElementById(p + '-q-choices');
                container.innerHTML = '';
                choices.forEach(c => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn'; btn.textContent = c.y;
                    btn.onclick = () => quizTap(c.t, p);
                    container.appendChild(btn);
                });
            });
        }

        function quizTap(term, pPrefix) {
            if (!gameActive || !currentTarget) return; // バグ修正: ゲーム終了後の入力を遮断
            const isP1 = pPrefix === 'p1';
            stats[pPrefix].total++;
            if (term === currentTarget.t) {
                stats[pPrefix].correct++;
                beep(1000, 0.4);
                if (isP1) p1Score += 3; else p2Score += 3;
                document.getElementById('p1-score').textContent = p1Score;
                document.getElementById('p2-score').textContent = p2Score;
                
                if (currentGameMode === 'quiz' && activeData.length > 0) {
                    currentTarget = null;
                    setTimeout(showLastMission, 800);
                } else {
                    activeData = [];
                    gameActive = false; // バグ修正: ラスト問題正解時にフラグを落とす
                    showResult();
                }
            } else {
                beep(200, 0.2);
                if (isP1) p1Score = Math.max(0, p1Score - 1); else p2Score = Math.max(0, p2Score - 1);
                document.getElementById('p1-score').textContent = p1Score;
                document.getElementById('p2-score').textContent = p2Score;
            }
        }

        function showResult() {
            gameActive = false;
            synth.cancel();
            localStorage.setItem('scienceKarutaStats', JSON.stringify(stats));
            updateAccuracyDisplay();
            
            const p1R = document.getElementById('p1-result');
            const p2R = document.getElementById('p2-result');
            p1R.style.display = 'block'; p2R.style.display = 'block';
            if (p1Score > p2Score) { p1R.textContent = "WIN"; p1R.className = "result-display win"; p2R.textContent = "LOSE"; p2R.className = "result-display lose"; }
            else if (p2Score > p1Score) { p2R.textContent = "WIN"; p2R.className = "result-display win"; p1R.textContent = "LOSE"; p1R.className = "result-display lose"; }
            else { p1R.textContent = "DRAW"; p2R.textContent = "DRAW"; p1R.className = p2R.className = "result-display"; }
            document.getElementById('start-btn').disabled = false;
        }

        function updateAccuracyDisplay() {
            const p1a = stats.p1.total === 0 ? 0 : Math.round((stats.p1.correct / stats.p1.total) * 100);
            const p2a = stats.p2.total === 0 ? 0 : Math.round((stats.p2.correct / stats.p2.total) * 100);
            document.getElementById('p1-acc').textContent = p1a + "%";
            document.getElementById('p2-acc').textContent = p2a + "%";
        }

        function resetStats() {
            if (confirm("通算正解率を初期化しますか？")) {
                stats = { p1: { total: 0, correct: 0 }, p2: { total: 0, correct: 0 } };
                localStorage.removeItem('scienceKarutaStats');
                updateAccuracyDisplay();
            }
        }

        function showEffects(p, combo, speed, lucky) {
            const cEl = document.getElementById(p + '-combo');
            if (combo > 1) { cEl.textContent = combo + " COMBO! +" + combo; cEl.style.display = 'block'; setTimeout(() => cEl.style.display = 'none', 800); }
            if (lucky) { const lEl = document.getElementById(p + '-lucky'); lEl.style.display = 'block'; setTimeout(() => lEl.style.display = 'none', 1000); }
        }

        function applyPenalty(boardId) {
            const pid = boardId === 'p1-board' ? 'p1' : 'p2';
            const board = document.getElementById(boardId);
            const msg = document.getElementById(pid + '-penalty');
            board.classList.add('penalty'); msg.style.display = 'block'; beep(150, 0.4);
            setTimeout(() => { board.classList.remove('penalty'); msg.style.display = 'none'; }, 2000);
        }

        function beep(freq, dur) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq; gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }
    </script>
</body>
</html>
